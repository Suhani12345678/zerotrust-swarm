name: ZeroTrust-Swarm CI
on:
  push:
    branches: [main]
jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r backend/requirements.txt
      - run: cd backend && python benchmark.py
      - name: Run OWASP tests
        run: |
          cd backend
          python main.py &
          sleep 3
          python test_owasp_llm_top10.py
        continue-on-error: true
